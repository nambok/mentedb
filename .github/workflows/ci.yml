name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo check --workspace
      # The local-embeddings feature (candle, hf-hub) is off by default, so a
      # plain workspace check misses breaks in it, which then only surface in
      # the Docker/wheel build. Check it explicitly.
      - run: cargo check -p mentedb-embedding --features local
      # Same for the optional native Bedrock (Titan) embedding provider.
      - run: cargo test -p mentedb-embedding --features bedrock

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace -- -D warnings
