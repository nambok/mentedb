name: Publish SDKs

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish-python:
    name: Build Python wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Sync SDK version from workspace Cargo.toml
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "📦 Syncing Python SDK to v${VERSION}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" sdks/python/Cargo.toml
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" sdks/python/pyproject.toml
          rm -f sdks/python/Cargo.toml.bak sdks/python/pyproject.toml.bak
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sdks/python
          command: build
          args: --release
          # Containerized manylinux build: without it the linux wheel gets
          # tagged with the runner's glibc (2.39), shutting out older distros.
          manylinux: auto
          # Vendored OpenSSL builds from source inside the container and
          # needs perl with IPC::Cmd; system OpenSSL there is 1.0.2, too old.
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then dnf install -y perl-core perl-IPC-Cmd
            elif command -v yum >/dev/null 2>&1; then yum install -y perl-core perl-IPC-Cmd
            else apt-get update && apt-get install -y perl make
            fi
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.os }}
          path: sdks/python/target/wheels/

  upload-pypi:
    name: Publish to PyPI
    needs: publish-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  build-npm:
    name: Build npm native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mentedb.linux-x64-gnu.node
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            artifact: mentedb.linux-arm64-gnu.node
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mentedb.darwin-arm64.node
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mentedb.darwin-x64.node
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mentedb.win32-x64-msvc.node
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Sync SDK version from workspace Cargo.toml
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "📦 Syncing TypeScript SDK to v${VERSION}"
          cd sdks/typescript
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          rm -f Cargo.toml.bak
      - name: Install protobuf compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y protobuf-compiler
      - name: Install protobuf compiler (macOS)
        if: runner.os == 'macOS'
        run: brew install protobuf
      - name: Install protobuf compiler (Windows)
        if: runner.os == 'Windows'
        run: choco install protoc -y
      - name: Install napi-rs CLI
        run: npm install -g @napi-rs/cli
      - name: Build native module
        working-directory: sdks/typescript
        run: napi build --release --platform --target ${{ matrix.target }}
      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: npm-${{ matrix.target }}
          path: sdks/typescript/${{ matrix.artifact }}

  publish-npm:
    name: Publish to npm
    needs: build-npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Sync SDK version from workspace Cargo.toml
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "📦 Syncing TypeScript SDK to v${VERSION}"
          cd sdks/typescript
          node -e "const p=require('./package.json'); p.version='${VERSION}'; require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
      - name: Download all native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: npm-*
          merge-multiple: true
          path: sdks/typescript/
      - name: Verify native binaries
        working-directory: sdks/typescript
        run: |
          echo "Built native binaries:"
          ls -la *.node
          EXPECTED=5
          ACTUAL=$(ls *.node | wc -l | tr -d ' ')
          if [ "$ACTUAL" -ne "$EXPECTED" ]; then
            echo "❌ Expected $EXPECTED .node files, found $ACTUAL"
            exit 1
          fi
          echo "✅ All $EXPECTED platform binaries present"
      - name: Install dependencies
        working-directory: sdks/typescript
        run: npm install
      - name: Compile TypeScript
        working-directory: sdks/typescript
        run: npx tsc
      - name: Publish to npm
        working-directory: sdks/typescript
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view mentedb version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "Version $CURRENT already published, skipping"
          else
            npm publish --access public --provenance
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-integrations:
    name: Publish LangChain & CrewAI
    needs: upload-pypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build
      - name: Sync integration versions from workspace Cargo.toml
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "📦 Syncing integrations to v${VERSION}"
          for toml in sdks/python/integrations/langchain/pyproject.toml sdks/python/integrations/crewai/pyproject.toml; do
            sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" "$toml"
            sed -i "s/\"mentedb>=.*\"/\"mentedb>=${VERSION}\"/" "$toml"
          done
      - name: Build and publish mentedb-langchain
        working-directory: sdks/python/integrations/langchain
        run: python -m build
      - name: Build and publish mentedb-crewai
        working-directory: sdks/python/integrations/crewai
        run: python -m build
      - name: Collect dists
        run: |
          mkdir -p dist/
          cp sdks/python/integrations/langchain/dist/* dist/
          cp sdks/python/integrations/crewai/dist/* dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Extract version
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [ -n "$TAG" ]; then
            VERSION="${TAG#mentedb-v}"
          else
            VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "mentedb") | .version')
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/nambok/mentedb:latest
            ghcr.io/nambok/mentedb:${{ steps.version.outputs.version }}
