name: Publish SDKs

on:
  release:
    types: [published]

permissions: {}

jobs:
  publish-python:
    name: Build Python wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sdks/python
          command: build
          args: --release
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: sdks/python/target/wheels/

  upload-pypi:
    name: Publish to PyPI
    needs: publish-python
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: cd sdks/typescript && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-integrations:
    name: Publish LangChain & CrewAI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build tools
        run: pip install build
      - name: Build and publish mentedb-langchain
        working-directory: sdks/python/integrations/langchain
        run: python -m build
      - name: Build and publish mentedb-crewai
        working-directory: sdks/python/integrations/crewai
        run: python -m build
      - name: Collect dists
        run: |
          mkdir -p dist/
          cp sdks/python/integrations/langchain/dist/* dist/
          cp sdks/python/integrations/crewai/dist/* dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  publish-docker:
    name: Publish Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#mentedb-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/nambok/mentedb:latest
            ghcr.io/nambok/mentedb:${{ steps.version.outputs.version }}
