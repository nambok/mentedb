name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p mentedb-core
          sleep 30
          cargo publish -p mentedb-storage
          sleep 30
          cargo publish -p mentedb-index
          sleep 30
          cargo publish -p mentedb-graph
          sleep 30
          cargo publish -p mentedb-embedding
          sleep 30
          cargo publish -p mentedb-cognitive
          sleep 30
          cargo publish -p mentedb-consolidation
          sleep 30
          cargo publish -p mentedb-context
          sleep 30
          cargo publish -p mentedb-query
          sleep 30
          cargo publish -p mentedb

  publish-python:
    name: Build Python wheels
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: sdks/python
          command: build
          args: --release
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: sdks/python/target/wheels/

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: cd sdks/typescript && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
