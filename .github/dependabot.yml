# Dependabot keeps the engine's Rust dependencies and CI actions current.
# Updates are GROUPED so a day's bumps arrive as one or two PRs, not dozens:
# all minor/patch cargo bumps in one PR (majors stay separate so a breaking one
# does not block the safe ones), and all GitHub Actions in one PR. CI gates each
# PR, and release-plz cuts the crates.io release when a bump lands on main.
version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: daily
    allow:
      - dependency-type: all
    ignore:
      # bincode 3.0.0 is a non-compiling placeholder (compile_error! -> xkcd 2347).
      # bincode major bumps also change the on-disk serialization format, so they
      # must be a deliberate, wire-format-tested migration, never an auto-PR.
      - dependency-name: "bincode"
        update-types: ["version-update:semver-major"]
      # hf-hub 1.0 is a full API rewrite (Api/Repo/Cache became HFClient) that
      # breaks the local-embeddings model download. CI does not build that
      # feature, so the break slips through, keep majors as a deliberate migration.
      - dependency-name: "hf-hub"
        update-types: ["version-update:semver-major"]
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch
    labels:
      - dependencies
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
    open-pull-requests-limit: 5
